<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory - Ready to play?</title>
</head>

<body>
    <main id="landing-page" class="landing-page">
        <!-- Decorative background icon -->
        <img src="/assets/controller.svg" alt="" class="landing-page__bg-icon" width="500" height="364">

        <section class="landing-page__content">
            <span class="text-secondary">It’s play time.</span>
            <h1 class="heading-primary">Ready to play?</h1>
            
            <button id="btn-play" class="btn-play">
                <img src="/assets/controller.svg" alt="" class="icon-controller" width="44" height="32">
                <span>Play</span>
                <svg class="icon-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </section>
    </main>

    <section id="settings-page" class="settings-page hidden">
        <div class="settings-container container container--settings">
            <header class="settings-header">
                <h2 class="heading-secondary">Settings</h2>
            </header>

            <div class="settings-content">
                <div class="settings-options">
                    <!-- Themes -->
                    <div class="settings-group">
                        <div class="settings-group__label">
                            <span class="icon">
                                <img src="/assets/palette.svg" alt="Theme Icon" style="width: 60%; height: 60%; object-fit: contain;">
                            </span>
                            <h3>Game themes</h3>
                        </div>
                        <div class="settings-radios">
                            <label class="custom-radio">
                                <input type="radio" name="theme" value="codevibe" checked>
                                <span class="radio-mark"></span>
                                <span class="radio-label">Code vibes theme</span>
                            </label>
                            <label class="custom-radio">
                                <input type="radio" name="theme" value="gaming">
                                <span class="radio-mark"></span>
                                <span class="radio-label">Gaming theme</span>
                            </label>
                            <label class="custom-radio">
                                <input type="radio" name="theme" value="daprojects">
                                <span class="radio-mark"></span>
                                <span class="radio-label">DA Projects theme</span>
                            </label>
                            <label class="custom-radio">
                                <input type="radio" name="theme" value="foods">
                                <span class="radio-mark"></span>
                                <span class="radio-label">Foods theme</span>
                            </label>
                        </div>
                    </div>

                    <!-- Player -->
                    <div class="settings-group">
                        <div class="settings-group__label">
                            <span class="icon">
                                <img src="/assets/chess-piece-white.svg" alt="Player Icon" style="width: 60%; height: 60%; object-fit: contain;">
                            </span>
                            <h3>Choose player</h3>
                        </div>
                        <div class="settings-radios">
                            <label class="custom-radio">
                                <input type="radio" name="player" value="blue" checked>
                                <span class="radio-mark"></span>
                                <span class="radio-label">Blue</span>
                            </label>
                            <label class="custom-radio">
                                <input type="radio" name="player" value="orange">
                                <span class="radio-mark"></span>
                                <span class="radio-label">Orange</span>
                            </label>
                        </div>
                    </div>

                    <!-- Board Size -->
                    <div class="settings-group">
                        <div class="settings-group__label">
                            <span class="icon">
                                <img src="/assets/board-size.svg" alt="Board Size Icon" style="width: 60%; height: 60%; object-fit: contain;">
                            </span>
                            <h3>Board size</h3>
                        </div>
                        <div class="settings-radios">
                            <label class="custom-radio">
                                <input type="radio" name="size" value="16" checked>
                                <span class="radio-mark"></span>
                                <span class="radio-label">16 cards</span>
                            </label>
                            <label class="custom-radio">
                                <input type="radio" name="size" value="24">
                                <span class="radio-mark"></span>
                                <span class="radio-label">24 cards</span>
                            </label>
                            <label class="custom-radio">
                                <input type="radio" name="size" value="36">
                                <span class="radio-mark"></span>
                                <span class="radio-label">36 cards</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="settings-preview">
                    <div class="preview-card" id="theme-preview">
                        <img src="/assets/theme-preview-pictures/codevibe-theme.png" alt="Theme Preview" class="preview-img">
                    </div>
                </div>
            </div>

            <footer class="settings-footer">
                <div class="selection-summary">
                    <span id="summary-theme">Code vibes</span>
                    <span class="separator">/</span>
                    <span id="summary-player">Player Blue</span>
                    <span class="separator">/</span>
                    <span id="summary-size">16 cards</span>
                </div>
                <button class="btn-start" id="btn-start">
                    <img src="/assets/start-icon.svg" alt="Start Icon" width="24" height="24">
                    Start
                </button>
            </footer>
        </div>
    </section>

    <section id="game-page" class="game-page hidden">
        <header class="main-header container container--game">
            <div class="score-container" id="score-container">
                <!-- Dynamically populated -->
            </div>
            <div class="current-player-display">
                Current player: <span id="current-player-icon" class="icon"><img src="/assets/chess-piece-white.svg" alt="Player" width="24" height="24"></span>
            </div>
            <button class="btn-exit" id="btn-exit">
                <img src="/assets/button-exit/exit.svg" alt="Exit" width="20" height="20">
                Exit game
            </button>
        </header>

        <div class="game-board-container">
            <div class="game-board" id="game-board">
                <!-- Cards will be generated here -->
        </div>
    </section>

    <!-- Exit Game Modal -->
    <div id="exit-modal-overlay" class="modal-overlay">
        <div class="modal">
            <h2 class="modal__title">Are you sure you want to quit<br>the game?</h2>
            <div class="modal__actions">
                <button id="btn-back-to-game" class="btn-modal-primary">Back to game</button>
                <button id="btn-confirm-exit" class="btn-modal-secondary">Exit game</button>
            </div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-modal-overlay" class="modal-overlay" style="background: #3B3B3B;">
        <div class="modal modal--game-over" style="background: transparent; border: none; box-shadow: none;">
            <h2 class="game-over-title" style="font-size: 80px; font-weight: bold; color: #63CDBB; text-shadow: 2px 4px 6px rgba(0,0,0,0.5); margin-bottom: 40px; letter-spacing: 2px;">Game over</h2>
            <div class="final-score-container" style="color: white; font-size: 20px;">
                <p style="margin-bottom: 20px;">Final score</p>
                <div class="final-scores" style="display: inline-flex; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 8px; gap: 20px;">
                    <span class="score-team blue" style="color: #38bdf8; display: flex; align-items: center; gap: 8px;"><img src="/assets/chess-piece-blue.svg" alt="" width="20"> Blue <span id="final-score-blue" style="font-weight: bold;">0</span></span>
                    <span class="score-team orange" style="color: #fb923c; display: flex; align-items: center; gap: 8px;"><img src="/assets/chess-piece-orange.svg" alt="" width="20"> Orange <span id="final-score-orange" style="font-weight: bold;">0</span></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Winner Modal -->
    <div id="winner-modal-overlay" class="modal-overlay" style="background: #3B3B3B;">
        <div class="confetti-container" id="confetti-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 200px; overflow: hidden; pointer-events: none;"></div>
        <div class="modal modal--winner" style="background: transparent; border: none; box-shadow: none; color: white;">
            <p style="font-size: 24px; margin-bottom: 10px;">The winner is</p>
            <h2 id="winner-name" style="font-size: 44px; text-transform: uppercase; font-weight: bold;">ORANGE PLAYER</h2>
            <img id="winner-icon" src="/assets/chess-piece-orange.svg" alt="" style="width: 150px; margin: 40px auto; display: block;">
            <div class="modal__actions">
                <button id="btn-back-to-start" class="btn-modal-secondary" style="background: transparent; border-color: rgba(255,255,255,0.3); color: white;">Back to start</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
